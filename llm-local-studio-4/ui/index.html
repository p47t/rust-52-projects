<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local LLM Studio</title>
    <!-- Import modern Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>LLM Studio</h2>
          <div class="status-indicator">
            <span class="dot"></span>
            <span class="status-text">Connected</span>
          </div>
        </div>
        
        <div class="model-selector-container">
          <label for="model-selector">Select Model</label>
          <div class="select-wrapper">
            <select id="model-selector">
              <option value="" disabled selected>Loading models...</option>
            </select>
            <div class="select-icon">
              <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
        </div>
        
        <div class="settings-container">
          <div class="audio-settings-container" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
            <h3 style="margin-bottom: 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">Audio Settings</h3>
            
            <label for="audio-mode" style="font-size: 12px; margin-bottom: 6px; display: block; color: var(--text-muted);">Audio Input Mode</label>
            <div class="select-wrapper" style="margin-bottom: 15px;">
              <select id="audio-mode">
                <option value="asr" selected>Transcription (ASR)</option>
              </select>
              <div class="select-icon">
                <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>

            <div id="whisper-settings">
              <label for="audio-task" style="font-size: 12px; margin-bottom: 6px; display: block; color: var(--text-muted);">Audio Task</label>
              <div class="select-wrapper" style="margin-bottom: 15px;">
                <select id="audio-task">
                  <option value="transcribe" selected>Transcribe (ASR)</option>
                  <option value="translate">Translate to EN (AST)</option>
                </select>
                <div class="select-icon">
                  <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>

              <label for="audio-language" style="font-size: 12px; margin-bottom: 6px; display: block; color: var(--text-muted);">Source Language</label>
              <div class="select-wrapper">
                <select id="audio-language">
                  <option value="auto" selected>Auto Detect</option>
                  <option value="en">English</option>
                  <option value="es">Spanish</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="zh">Chinese</option>
                  <option value="ja">Japanese</option>
                  <option value="ko">Korean</option>
                  <option value="it">Italian</option>
                  <option value="ru">Russian</option>
                </select>
                <div class="select-icon">
                  <svg width="12" height="8" viewBox="0 0 12 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main class="chat-container">
        <header class="chat-header">
          <h1 id="current-model-name">Chat</h1>
          <p class="subtitle">Local Inference Engine</p>
        </header>

        <div class="chat-history" id="chat-history">
          <!-- Chat messages will be injected here -->
          <div class="welcome-message">
            <h3>Welcome to Local LLM Studio</h3>
            <p>Select a model from the sidebar to begin chatting.</p>
          </div>
        </div>

        <div class="chat-input-wrapper">
          <form id="chat-form" class="chat-form">
            <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
            <button type="button" id="mic-button" class="mic-button" title="Record Voice">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
            <button type="submit" id="send-button" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </form>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
